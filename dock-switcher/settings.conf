# Dock Switcher Settings
# Edit this file to configure what changes per location.
# Changes take effect on the next location switch — no script edits needed.
#
# Requirements:
#   - DockFlow (https://dockflow.app) for dock switching
#   - WireGuard (Mac App Store) + a .conf imported as a VPN profile for VPN
#   - terminal-notifier (brew install terminal-notifier) for notifications
#   - firewall/stealth_mode require passwordless sudo (bootstrap.sh sets this up)
#
# wireguard_tunnel : must match tunnel name in WireGuard.app / System Settings → VPN
# kill_apps        : comma-separated process names to quit, e.g. "Dropbox,OneDrive"
# notification     : shows a macOS banner when location switches

# ── WireGuard Tunnel Name (change here if you switch servers) ─────────────────
WIREGUARD_TUNNEL="US-NJ-67"

# ── Home ──────────────────────────────────────────────────────────────────────
HOME_dockflow=on
HOME_dockflow_preset="Home"
HOME_firewall=off
HOME_stealth_mode=off
HOME_airdrop=on
HOME_wireguard=off
HOME_kill_apps=""
HOME_notification=on

# ── Work ──────────────────────────────────────────────────────────────────────
WORK_dockflow=on
WORK_dockflow_preset="Work"
WORK_firewall=on
WORK_stealth_mode=off
WORK_airdrop=off
WORK_wireguard=off
WORK_kill_apps=""
WORK_notification=on

# ── Remote ────────────────────────────────────────────────────────────────────
REMOTE_dockflow=on
REMOTE_dockflow_preset="Remote"
REMOTE_firewall=on
REMOTE_stealth_mode=on
REMOTE_airdrop=off
REMOTE_wireguard=on
REMOTE_kill_apps=""
REMOTE_notification=on

# ── Automatic (unknown/public Wi-Fi) ─────────────────────────────────────────
AUTOMATIC_dockflow=on
AUTOMATIC_dockflow_preset="Default"
AUTOMATIC_firewall=on
AUTOMATIC_stealth_mode=on
AUTOMATIC_airdrop=off
AUTOMATIC_wireguard=off
AUTOMATIC_kill_apps=""
AUTOMATIC_notification=on
