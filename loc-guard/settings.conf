# Settings — generated by bootstrap.sh
# Edit this file to adjust toggles. Changes take effect on next location switch.
#
# wireguard_tunnel : must match tunnel name shown in System Settings → VPN
# kill_apps        : comma-separated process names to quit, e.g. "Dropbox,OneDrive"
# notification     : shows a macOS banner when location switches

# ── Home ──────────────────────────────────────────────────────────────────────
HOME_firewall=off
HOME_stealth_mode=off
HOME_airdrop=on
HOME_wireguard=off
HOME_wireguard_tunnel=""
HOME_kill_apps=""
HOME_notification=on

# ── Work ──────────────────────────────────────────────────────────────────────
WORK_firewall=on
WORK_stealth_mode=off
WORK_airdrop=off
WORK_wireguard=off
WORK_wireguard_tunnel=""
WORK_kill_apps=""
WORK_notification=on

# ── Remote ────────────────────────────────────────────────────────────────────
REMOTE_firewall=on
REMOTE_stealth_mode=on
REMOTE_airdrop=off
REMOTE_wireguard=on
REMOTE_wireguard_tunnel=""
REMOTE_kill_apps=""
REMOTE_notification=on

# ── Automatic (unknown/public Wi-Fi) ─────────────────────────────────────────
AUTOMATIC_firewall=on
AUTOMATIC_stealth_mode=on
AUTOMATIC_airdrop=off
AUTOMATIC_wireguard=off
AUTOMATIC_wireguard_tunnel=""
AUTOMATIC_kill_apps=""
AUTOMATIC_notification=on
